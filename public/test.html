<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试</title>
</head>
<body>
    <h1>测试页面</h1>
    <button onclick="testClick()">点击测试</button>
    <p id="result">等待点击...</p>

    <script>
        function testClick() {
            document.getElementById('result').textContent = '按钮点击成功！';
            console.log('按钮被点击了');
        }
        
        console.log('脚本已加载');
    </script>
</body>
</html>
